version: '3.8'

services:
  redis:
    image: redis
    ports:
      - "6379:6379"

  # postgres:
  #   image: postgres
  #   environment:
  #     POSTGRES_USER: user
  #     POSTGRES_PASSWORD: pass
  #     POSTGRES_DB: quickcommerce
  #   ports:
  #     - "5432:5432"

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"

  product-service-ts:
    build: ./services/product-service-ts
    ports:
      - "8080:5001"
    environment:
      - PORT=5001
    depends_on:
      - redis
      - rabbitmq

